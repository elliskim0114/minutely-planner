<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#FFFDF9"/>
      <stop offset="100%" stop-color="#FAF0E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Constellation skeleton lines (thin, behind arcs) -->
  <line x1="80" y1="352" x2="168" y2="162" stroke="#C8703A" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="168" y1="162" x2="256" y2="352" stroke="#C8703A" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="256" y1="352" x2="344" y2="162" stroke="#C8703A" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="344" y1="162" x2="432" y2="352" stroke="#C8703A" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Horizon line -->
  <line x1="56" y1="352" x2="456" y2="352" stroke="#DEAD8A" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Left sunrise arc (ellipse center 168,352  rx=88 ry=190) -->
  <path d="M 80 352 A 88 190 0 0 0 256 352"
        fill="none" stroke="#E8581A" stroke-width="20" stroke-linecap="round"/>

  <!-- Right sunrise arc (ellipse center 344,352  rx=88 ry=190) -->
  <path d="M 256 352 A 88 190 0 0 0 432 352"
        fill="none" stroke="#E8581A" stroke-width="20" stroke-linecap="round"/>

  <!-- Constellation node dots -->
  <!-- Feet / baseline nodes -->
  <circle cx="80"  cy="352" r="8"  fill="#E8581A"/>
  <circle cx="256" cy="352" r="8"  fill="#E8581A"/>
  <circle cx="432" cy="352" r="8"  fill="#E8581A"/>
  <!-- Peak nodes (slightly larger — the "bright stars") -->
  <circle cx="168" cy="162" r="11" fill="#E8581A"/>
  <circle cx="344" cy="162" r="11" fill="#E8581A"/>

  <!-- Halo rings at peaks (AI / signal pulse feel) -->
  <circle cx="168" cy="162" r="20" fill="none" stroke="#E8581A" stroke-width="1.5" opacity="0.22"/>
  <circle cx="344" cy="162" r="20" fill="none" stroke="#E8581A" stroke-width="1.5" opacity="0.22"/>
</svg>
